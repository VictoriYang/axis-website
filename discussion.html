<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Agent 实时讨论</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .container { display: flex; height: 100vh; }
        
        /* 沙盘区域 */
        .sandbox {
            flex: 1;
            background: #16213e;
            position: relative;
            overflow: hidden;
        }
        
        .sandbox-title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: #666;
            z-index: 10;
        }
        
        /* 部门区域 */
        .dept-zone {
            position: absolute;
            border: 2px dashed;
            border-radius: 15px;
            padding: 10px;
        }
        
        .dept-title {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 5px 10px;
            border-radius: 5px;
        }
        
        .dept-product { 
            top: 60px; left: 20px; width: 280px; height: 200px;
            border-color: #00d2ff; background: rgba(0,210,255,0.05);
        }
        .dept-product .dept-title { background: #00d2ff; color: #000; }
        
        .dept-tech { 
            top: 60px; right: 20px; width: 280px; height: 200px;
            border-color: #4caf50; background: rgba(76,175,80,0.05);
        }
        .dept-tech .dept-title { background: #4caf50; color: #fff; }
        
        .dept-ops { 
            top: 280px; left: 20px; width: 180px; height: 150px;
            border-color: #9c27b0; background: rgba(156,39,176,0.05);
        }
        .dept-ops .dept-title { background: #9c27b0; color: #fff; }
        
        .dept-support { 
            top: 280px; right: 20px; width: 280px; height: 150px;
            border-color: #e91e63; background: rgba(233,30,99,0.05);
        }
        .dept-support .dept-title { background: #e91e63; color: #fff; }
        
        .dept-hardware { 
            top: 450px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 120px;
            border-color: #607d8b; background: rgba(96,125,139,0.05);
        }
        .dept-hardware .dept-title { background: #607d8b; color: #fff; }
        
        /* Agent形象 */
        .agent {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.5s ease;
            z-index: 5;
            border: 3px solid rgba(255,255,255,0.3);
        }
        
        .agent:hover { transform: scale(1.1); z-index: 100; }
        
        /* 气泡 */
        .bubble {
            position: absolute;
            background: #fff;
            color: #000;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            max-width: 150px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 20px;
            border: 8px solid transparent;
            border-top-color: #fff;
        }
        
        .bubble.show { opacity: 1; transform: translateY(0); }
        
        /* Agent位置 - 产品部 */
        #agent-product { top: 120px; left: 80px; }
        #agent-product_assistant { top: 160px; left: 160px; }
        
        /* Agent位置 - 技术部 */
        #agent-tech { top: 120px; right: 80px; }
        #agent-tech_assistant { top: 160px; right: 160px; }
        
        /* Agent位置 - 运营部 */
        #agent-ops { top: 320px; left: 60px; }
        
        /* Agent位置 - 市场部 */
        #agent-support { top: 320px; right: 100px; }
        
        /* Agent位置 - 硬件部 */
        #agent-hardware { top: 480px; left: 50%; transform: translateX(-50%); }
        
        /* 气泡位置 - 产品部 */
        #bubble-product { top: 70px; left: 80px; }
        #bubble-product_assistant { top: 110px; left: 160px; }
        
        /* 气泡位置 - 技术部 */
        #bubble-tech { top: 70px; right: 80px; }
        #bubble-tech_assistant { top: 110px; right: 160px; }
        
        /* 气泡位置 - 运营部 */
        #bubble-ops { top: 270px; left: 60px; }
        
        /* 气泡位置 - 市场部 */
        #bubble-support { top: 270px; right: 100px; }
        
        /* 气泡位置 - 硬件部 */
        #bubble-hardware { top: 430px; left: 50%; transform: translateX(-50%); }
        
        /* 聊天区域 */
        .chat { width: 350px; background: #0f0f23; display: flex; flex-direction: column; border-left: 1px solid #333; }
        .chat-header { padding: 15px; border-bottom: 1px solid #333; }
        .chat-header h2 { font-size: 14px; font-weight: 500; }
        .chat-header p { font-size: 11px; color: #666; margin-top: 3px; }
        .chat-status { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .status-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; }
        .message { margin-bottom: 15px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .message-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .message-name { font-size: 12px; font-weight: 500; }
        .message-time { font-size: 10px; color: #666; }
        .message-content { background: #1a1a2e; padding: 10px 12px; border-radius: 10px; font-size: 12px; line-height: 1.5; margin-left: 32px; }
        
        .message-product .message-avatar { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }
        .message-product .message-content { border-left: 3px solid #00d2ff; }
        .message-product_assistant .message-avatar { background: linear-gradient(135deg, #00d2ff, #3a7bd5); opacity: 0.7; }
        
        .message-tech .message-avatar { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .message-tech .message-content { border-left: 3px solid #4caf50; }
        .message-tech_assistant .message-avatar { background: linear-gradient(135deg, #4caf50, #2e7d32); opacity: 0.7; }
        
        .message-ops .message-avatar { background: linear-gradient(135deg, #9c27b0, #673ab7); }
        .message-ops .message-content { border-left: 3px solid #9c27b0; }
        
        .message-support .message-avatar { background: linear-gradient(135deg, #e91e63, #c2185b); }
        .message-support .message-content { borderpx solid #e-left: 391e63; }
        
        .message-hardware .message-avatar { background: linear-gradient(135deg, #607d8b, #455a64); }
        .message-hardware .message-content { border-left: 3px solid #607d8b; }
        
        .message-strategist .message-avatar { background: linear-gradient(135deg, #ff9800, #ff5722); }
        .message-strategist .message-content { border-left: 3px solid #ff9800; }
        
        @media (max-width: 900px) { .chat { width: 280px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sandbox">
            <div class="sandbox-title">🏢 Axis Office · 各部门实时讨论</div>
            
            <!-- 产品部 -->
            <div class="dept-zone dept-product">
                <div class="dept-title">📦 产品部</div>
            </div>
            
            <!-- 技术部 -->
            <div class="dept-zone dept-tech">
                <div class="dept-title">⚙️ 技术部</div>
            </div>
            
            <!-- 运营部 -->
            <div class="dept-zone dept-ops">
                <div class="dept-title">📊 运营部</div>
            </div>
            
            <!-- 市场部 -->
            <div class="dept-zone dept-support">
                <div class="dept-title">💬 市场部</div>
            </div>
            
            <!-- 硬件部 -->
            <div class="dept-zone dept-hardware">
                <div class="dept-title">🔧 硬件部</div>
            </div>
            
            <!-- 产品部Agent -->
            <div class="agent" id="agent-product" style="background: linear-gradient(135deg, #00d2ff, #3a7bd5);" title="产品Agent">📦</div>
            <div class="agent" id="agent-product_assistant" style="background: linear-gradient(135deg, #00d2ff, #3a7bd5); opacity: 0.7;" title="产品Assistant">👤</div>
            
            <!-- 技术部Agent -->
            <div class="agent" id="agent-tech" style="background: linear-gradient(135deg, #4caf50, #2e7d32);" title="技术Agent">⚙️</div>
            <div class="agent" id="agent-tech_assistant" style="background: linear-gradient(135deg, #4caf50, #2e7d32); opacity: 0.7;" title="技术Assistant">👤</div>
            
            <!-- 运营部Agent -->
            <div class="agent" id="agent-ops" style="background: linear-gradient(135deg, #9c27b0, #673ab7);" title="运营Agent">📊</div>
            
            <!-- 市场部Agent -->
            <div class="agent" id="agent-support" style="background: linear-gradient(135deg, #e91e63, #c2185b);" title="客服Agent">💬</div>
            
            <!-- 硬件部Agent -->
            <div class="agent" id="agent-hardware" style="background: linear-gradient(135deg, #607d8b, #455a64);" title="硬件Agent">🔧</div>
            
            <!-- 气泡 -->
            <div class="bubble" id="bubble-product"></div>
            <div class="bubble" id="bubble-product_assistant"></div>
            <div class="bubble" id="bubble-tech"></div>
            <div class="bubble" id="bubble-tech_assistant"></div>
            <div class="bubble" id="bubble-ops"></div>
            <div class="bubble" id="bubble-support"></div>
            <div class="bubble" id="bubble-hardware"></div>
        </div>
        
        <div class="chat">
            <div class="chat-header">
                <h2>🤖 Agent 实时讨论</h2>
                <p id="topic">正在讨论：各部门工作细化</p>
                <div class="chat-status">
                    <div class="status-dot"></div>
                    <span style="font-size:11px;color:#666;"><span id="msg-count">0</span> 条消息</span>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages"></div>
        </div>
    </div>
    
    <script>
        const agentInfo = {
            'product': { name: '产品Agent', icon: '📦' },
            'product_assistant': { name: '产品Assistant', icon: '👤' },
            'tech': { name: '技术Agent', icon: '⚙️' },
            'tech_assistant': { name: '技术Assistant', icon: '👤' },
            'ops': { name: '运营Agent', icon: '📊' },
            'support': { name: '市场Agent', icon: '💬' },
            'hardware': { name: '硬件Agent', icon: '🔧' },
            'strategist': { name: '战略Agent', icon: '🎯' }
        };
        
        let lastMessageCount = 0;
        
        function getTime() {
            return new Date().toTimeString().split(' ')[0].substring(0,5);
        }
        
        function showBubble(agentId, content) {
            const bubble = document.getElementById('bubble-' + agentId);
            if (bubble) {
                bubble.textContent = content.length > 30 ? content.substring(0,30) + '...' : content;
                bubble.classList.add('show');
                setTimeout(() => bubble.classList.remove('show'), 3000);
            }
            
            // Agent动画
            const agent = document.getElementById('agent-' + agentId);
            if (agent) {
                agent.style.animation = 'none';
                agent.offsetHeight; // trigger reflow
                agent.style.animation = 'pulse 0.5s ease-in-out';
            }
        }
        
        function addMessage(agentId, content, time) {
            const agent = agentInfo[agentId] || { name: agentId, icon: '👤' };
            const messagesDiv = document.getElementById('chat-messages');
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message message-${agentId}`;
            msgDiv.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar">${agent.icon}</div>
                    <span class="message-name">${agent.name}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-content">${content}</div>
            `;
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            document.getElementById('msg-count').textContent = parseInt(document.getElementById('msg-count').textContent) + 1;
            
            // 显示气泡
            showBubble(agentId, content);
        }
        
        function loadDiscussion() {
            fetch('data/discussion.json?t=' + Date.now())
                .then(res => res.json())
                .then(data => {
                    const messages = data.messages || [];
                    
                    if (messages.length > lastMessageCount) {
                        for (let i = lastMessageCount; i < messages.length; i++) {
                            const msg = messages[i];
                            addMessage(msg.agent, msg.content, msg.time);
                        }
                        lastMessageCount = messages.length;
                    }
                    
                    document.getElementById('topic').textContent = '正在讨论：' + (data.topic || '各部门工作细化');
                })
                .catch(err => console.log('等待数据...'));
        }
        
        // 初始加载
        window.onload = function() {
            loadDiscussion();
        };
        
        // 每3秒刷新
        setInterval(loadDiscussion, 3000);
    </script>
</body>
</html>
