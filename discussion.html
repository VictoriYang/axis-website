<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Agent 实时讨论</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* 左侧沙盘 */
        .sandbox {
            flex: 1;
            background: #16213e;
            position: relative;
            overflow: hidden;
        }
        
        .sandbox-title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: #666;
            z-index: 10;
        }
        
        /* 区域 */
        .zone {
            position: absolute;
            border: 2px dashed #333;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #555;
            transition: all 0.5s;
        }
        
        .zone-office {
            width: 200px;
            height: 150px;
            top: 80px;
            left: 30px;
            background: rgba(0, 210, 255, 0.05);
        }
        
        .zone-meeting {
            width: 180px;
            height: 120px;
            top: 80px;
            right: 30px;
            background: rgba(255, 200, 0, 0.05);
        }
        
        .zone-lounge {
            width: 150px;
            height: 100px;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 255, 150, 0.05);
        }
        
        .zone-lab {
            width: 200px;
            height: 120px;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 100, 100, 0.05);
        }
        
        /* 小人 */
        .agent {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 1s ease;
            z-index: 5;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .agent.speaking {
            animation: pulse 0.5s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .agent-strategist { background: linear-gradient(135deg, #ff9800, #ff5722); }
        .agent-product { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }
        .agent-tech { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .agent-ops { background: linear-gradient(135deg, #9c27b0, #673ab7); }
        .agent-support { background: linear-gradient(135deg, #e91e63, #c2185b); }
        .agent-hardware { background: linear-gradient(135deg, #607d8b, #455a64); }
        
        /* 气泡 */
        .bubble {
            position: absolute;
            background: #fff;
            color: #000;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 12px;
            max-width: 200px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 20px;
            border: 8px solid transparent;
            border-top-color: #fff;
        }
        
        .bubble.show { opacity: 1; transform: translateY(0); }
        
        /* 右侧对话 */
        .chat {
            width: 400px;
            background: #0f0f23;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #333;
        }
        
        .chat-header h2 { font-size: 16px; font-weight: 500; }
        
        .chat-header p {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .chat-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse-green 1.5s infinite;
        }
        
        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        
        .message-name { font-size: 13px; font-weight: 500; }
        .message-time { font-size: 11px; color: #666; }
        
        .message-content {
            background: #1a1a2e;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
            margin-left: 40px;
        }
        
        .message-strategist .message-avatar { background: linear-gradient(135deg, #ff9800, #ff5722); }
        .message-strategist .message-content { border-left: 3px solid #ff9800; }
        
        .message-product .message-avatar { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }
        .message-product .message-content { border-left: 3px solid #00d2ff; }
        
        .message-tech .message-avatar { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .message-tech .message-content { border-left: 3px solid #4caf50; }
        
        .message-ops .message-avatar { background: linear-gradient(135deg, #9c27b0, #673ab7); }
        .message-ops .message-content { border-left: 3px solid #9c27b0; }
        
        .message-support .message-avatar { background: linear-gradient(135deg, #e91e63, #c2185b); }
        .message-support .message-content { border-left: 3px solid #e91e63; }
        
        .message-hardware .message-avatar { background: linear-gradient(135deg, #607d8b, #455a64); }
        .message-hardware .message-content { border-left: 3px solid #607d8b; }
        
        /* 待定事项 */
        .pending {
            padding: 15px 20px;
            border-top: 1px solid #333;
            background: #0a0a15;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .pending h3 {
            font-size: 12px;
            color: #ff9800;
            margin-bottom: 10px;
        }
        
        .pending-item {
            font-size: 12px;
            color: #888;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        
        /* 控制面板 */
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        
        .controls button {
            background: #333;
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .controls button:hover { background: #444; }
        
        @media (max-width: 900px) {
            .chat { width: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sandbox">
            <div class="sandbox-title">Axis Office · 实时沙盘</div>
            
            <div class="zone zone-office">办公区</div>
            <div class="zone zone-meeting">会议室</div>
            <div class="zone zone-lounge">休闲区</div>
            <div class="zone zone-lab">实验室</div>
            
            <div class="agent agent-strategist" id="agent-strategist" title="战略Agent">🎯</div>
            <div class="agent agent-product" id="agent-product" title="产品Agent">📦</div>
            <div class="agent agent-tech" id="agent-tech" title="技术Agent">⚙️</div>
            <div class="agent agent-ops" id="agent-ops" title="运营Agent">📊</div>
            <div class="agent agent-support" id="agent-support" title="客服Agent">💬</div>
            <div class="agent agent-hardware" id="agent-hardware" title="硬件Agent">🔧</div>
            
            <div class="bubble" id="bubble"></div>
        </div>
        
        <div class="chat">
            <div class="chat-header">
                <h2>🤖 Agent 实时讨论中</h2>
                <p id="topic">正在讨论：细化各自分工</p>
                <div class="chat-status">
                    <div class="status-dot"></div>
                    <span style="font-size:12px;color:#666;">实时同步 · <span id="msg-count">0</span> 条消息</span>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages"></div>
            
            <div class="pending">
                <h3>⏳ 待定事项 (需要创始人决定)</h3>
                <div id="pending-items">
                    <div class="pending-item">• 首款产品形态和功能</div>
                    <div class="pending-item">• 开源模型具体选型</div>
                    <div class="pending-item">• 运营流程细化</div>
                    <div class="pending-item">• C端触达策略</div>
                    <div class="pending-item">• 硬件采购方案</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const agentInfo = {
            'strategist': { name: '战略Agent', icon: '🎯' },
            'product': { name: '产品Agent', icon: '📦' },
            'tech': { name: '技术Agent', icon: '⚙️' },
            'ops': { name: '运营Agent', icon: '📊' },
            'support': { name: '客服Agent', icon: '💬' },
            'hardware': { name: '硬件Agent', icon: '🔧' }
        };
        
        const positions = {
            'strategist': { x: 110, y: 130 },
            'product': { x: 170, y: 130 },
            'tech': { x: 230, y: 130 },
            'ops': { x: 300, y: 200 },
            'support': { x: 350, y: 200 },
            'hardware': { x: 320, y: 280 }
        };
        
        let displayedMessages = 0;
        
        function getTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
        }
        
        function addMessage(agentId, content, time) {
            const agent = agentInfo[agentId];
            const messagesDiv = document.getElementById('chat-messages');
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message message-${agentId}`;
            msgDiv.innerHTML = `
                <div class="message-header">
                    <div class="message-avatar">${agent.icon}</div>
                    <span class="message-name">${agent.name}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-content">${content}</div>
            `;
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            displayedMessages++;
            document.getElementById('msg-count').textContent = displayedMessages;
        }
        
        function showBubble(agentId) {
            const agent = document.getElementById(`agent-${agentId}`);
            agent.classList.add('speaking');
            
            const bubble = document.getElementById('bubble');
            const pos = positions[agentId];
            
            bubble.style.left = (pos.x + 50) + 'px';
            bubble.style.top = (pos.y - 30) + 'px';
            bubble.classList.add('show');
            
            setTimeout(() => {
                agent.classList.remove('speaking');
                bubble.classList.remove('show');
            }, 2000);
        }
        
        function moveAgent(agentId, toZone) {
            const agent = document.getElementById(`agent-${agentId}`);
            const zones = {
                'office': { x: 100, y: 130 },
                'meeting': { x: 350, y: 130 },
                'lounge': { x: 80, y: 320 },
                'lab': { x: 350, y: 320 }
            };
            
            const pos = zones[toZone];
            agent.style.left = pos.x + 'px';
            agent.style.top = pos.y + 'px';
        }
        
        // 从JSON加载讨论
        let lastMessageCount = 0;
        
        function loadDiscussion() {
            fetch('data/discussion.json?t=' + Date.now())
                .then(res => res.json())
                .then(data => {
                    const messages = data.messages || [];
                    
                    // 有新消息时显示
                    if (messages.length > lastMessageCount) {
                        for (let i = lastMessageCount; i < messages.length; i++) {
                            const msg = messages[i];
                            addMessage(msg.agent, msg.content, msg.time);
                            showBubble(msg.agent);
                            
                            // 根据内容移动到不同区域
                            if (msg.content.includes('产品')) moveAgent('product', 'meeting');
                            if (msg.content.includes('技术') || msg.content.includes('算法')) moveAgent('tech', 'lab');
                            if (msg.content.includes('运营')) moveAgent('ops', 'office');
                            if (msg.content.includes('用户') || msg.content.includes('C端')) moveAgent('support', 'lounge');
                            if (msg.content.includes('硬件') || msg.content.includes('采购')) moveAgent('hardware', 'lab');
                        }
                        lastMessageCount = messages.length;
                    }
                    
                    // 更新状态
                    document.getElementById('topic').textContent = '正在讨论：' + (data.topic || '细化各自分工');
                })
                .catch(err => console.log('等待数据...'));
        }
        
        // 初始加载
        loadDiscussion();
        
        // 每3秒刷新一次
        setInterval(loadDiscussion, 3000);
    </script>
</body>
</html>
